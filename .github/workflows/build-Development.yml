name: Publish Development PowerShell Module

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up PowerShell
      uses: Amadevus/pwsh-script@v2
      with:
        script: |
          Write-Host "PowerShell setup complete"
    
    - uses: actions/checkout@v2
    - name: Get Version from tag
      id: vars
      run: |
        echo "tag=${GITHUB_REF#refs/*/}" >> $GITHUB_OUTPUT
    - name: Check Version
      env:
        RELEASE_VERSION: ${{ steps.vars.outputs.tag }}
      shell: pwsh
      run: |
        write-host "Release check"
        write-host "Release version env: $RELEASE_VERSION"
        write-host "Release version step: ${{ steps.vars.outputs.tag }}"
        if ($RELEASE_VERSION -eq "") {
          write-host "No version found in tag"
          exit 1
        }
    - name: Install dependencies
      shell: pwsh
      run: .\Install-Dependencies.ps1
    - name: Run Pester tests
      shell: pwsh
      run: Invoke-Pester -Path .\src\tests\M365.Toolkit.Tests.ps1
