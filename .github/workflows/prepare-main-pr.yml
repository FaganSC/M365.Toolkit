name: Prepare Main Pull Request Version

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - labeled

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: main-pr-version-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  update-version:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: windows-latest

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v7
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set stable pull request version
        id: version
        shell: pwsh
        env:
          EVENT_ACTION: ${{ github.event.action }}
          EVENT_LABEL: ${{ github.event.label.name }}
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          $versionPattern = '^v?\d+\.\d+\.\d+(?:\.\d+)?$'
          $versionLabels = @(
            $env:PR_LABELS_JSON |
              ConvertFrom-Json |
              Where-Object { $_ -match $versionPattern }
          )

          if ($versionLabels.Count -gt 1) {
            throw "The pull request has multiple version labels: $($versionLabels -join ', ')"
          }

          if ($env:EVENT_ACTION -eq 'labeled' -and $env:EVENT_LABEL -notmatch $versionPattern) {
            'changed=false' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            exit 0
          }

          if ($versionLabels.Count -eq 1) {
            $explicitVersion = $versionLabels[0] -replace '^v', ''
            $newVersion = ./build/Update-ModuleVersion.ps1 `
              -ManifestPath ./M365.Toolkit.psd1 `
              -Version $explicitVersion `
              -ClearPrerelease
          }
          else {
            $newVersion = ./build/Update-ModuleVersion.ps1 `
              -ManifestPath ./M365.Toolkit.psd1 `
              -Bump Patch `
              -ClearPrerelease
          }

          'changed=true' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "new_version=$newVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Commit stable version
        if: steps.version.outputs.changed == 'true'
        shell: pwsh
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add M365.Toolkit.psd1

          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host 'The manifest already has the requested version.'
            exit 0
          }

          git commit -m "chore: set module version to v$env:NEW_VERSION"
          git push origin "HEAD:$env:HEAD_REF"
