name: Production Build, Release, and Publish Module

on:
  push:
    branches:
      - main
    paths-ignore:
      - docs/**
      - .github/workflows/pages.yml
  pull_request:
    branches:
      - main
    paths-ignore:
      - docs/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test-release-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read module version from manifest
        id: version
        shell: pwsh
        run: |
          $manifest = Import-PowerShellDataFile -Path ./M365.Toolkit.psd1
          $moduleVersion = [string]$manifest.ModuleVersion
          if ([string]::IsNullOrWhiteSpace($moduleVersion)) {
            throw 'ModuleVersion was not found in M365.Toolkit.psd1.'
          }

          $releaseTag = "v$moduleVersion"

          "module_version=$moduleVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_tag=$releaseTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install test dependencies
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.0.0 -Force -Scope CurrentUser
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          Install-Module -Name PnP.PowerShell -RequiredVersion 3.1.0 -Force -Scope CurrentUser -AllowClobber

      - name: Validate module manifest
        shell: pwsh
        run: |
          Test-ModuleManifest -Path ./M365.Toolkit.psd1 | Out-Null

      - name: Run Pester tests
        shell: pwsh
        run: |
          Invoke-Pester -Path ./src/tests/M365.Toolkit.Tests.ps1 -CI

      - name: Sign module scripts
        if: github.event_name != 'pull_request'
        shell: pwsh
        env:
          CODESIGNINGPFXBASE64: ${{ secrets.CODESIGNINGPFXBASE64 }}
          CODESIGNINGPFXPASSWORD: ${{ secrets.CODESIGNINGPFXPASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CODESIGNINGPFXBASE64)) {
            throw 'Secret CODESIGNINGPFXBASE64 is missing.'
          }
          if ([string]::IsNullOrWhiteSpace($env:CODESIGNINGPFXPASSWORD)) {
            throw 'Secret CODESIGNINGPFXPASSWORD is missing.'
          }

          $pfxCertificates = [Security.Cryptography.X509Certificates.X509Certificate2Collection]::new()
          $temporaryTrustStores = @()
          $certificate = $null
          $pfxBytes = $null

          try {
            Write-Host "[$(Get-Date -Format o)] Decoding the code-signing PFX."
            $pfxBytes = [Convert]::FromBase64String($env:CODESIGNINGPFXBASE64)

            Write-Host "[$(Get-Date -Format o)] Loading the code-signing certificate in memory."
            $pfxCertificates.Import(
              $pfxBytes,
              $env:CODESIGNINGPFXPASSWORD,
              [Security.Cryptography.X509Certificates.X509KeyStorageFlags]::EphemeralKeySet
            )

            $codeSigningOid = '1.3.6.1.5.5.7.3.3'
            $codeSigningCertificates = @(
              foreach ($candidate in $pfxCertificates) {
                $ekuExtension = $candidate.Extensions |
                  Where-Object {
                    $_ -is [Security.Cryptography.X509Certificates.X509EnhancedKeyUsageExtension]
                  } |
                  Select-Object -First 1
                $ekuOids = @(
                  if ($null -ne $ekuExtension) {
                    $ekuExtension.EnhancedKeyUsages | ForEach-Object Value
                  }
                )

                Write-Host (
                  "Loaded certificate: Subject='{0}', Thumbprint='{1}', HasPrivateKey={2}, EKUs='{3}'" -f
                  $candidate.Subject,
                  $candidate.Thumbprint,
                  $candidate.HasPrivateKey,
                  ($ekuOids -join ',')
                )

                if ($candidate.HasPrivateKey -and $ekuOids -contains $codeSigningOid) {
                  $candidate
                }
              }
            )
            $certificate = $codeSigningCertificates | Select-Object -First 1

            if ($null -eq $certificate) {
              throw 'The PFX does not contain a certificate with a private key that is valid for code signing.'
            }

            $isSelfSigned = $certificate.Subject -eq $certificate.Issuer
            if ($isSelfSigned) {
              foreach ($storeName in 'Root', 'TrustedPublisher') {
                Write-Host "[$(Get-Date -Format o)] Temporarily adding the certificate to $storeName."
                $store = [Security.Cryptography.X509Certificates.X509Store]::new(
                  $storeName,
                  [Security.Cryptography.X509Certificates.StoreLocation]::CurrentUser
                )
                try {
                  $store.Open([Security.Cryptography.X509Certificates.OpenFlags]::ReadWrite)
                  $store.Add($certificate)
                  $temporaryTrustStores += $storeName
                }
                finally {
                  $store.Close()
                }
              }
              Write-Warning 'Using a self-signed certificate. Consumers must trust this certificate separately.'
            }

            $now = Get-Date
            if ($now -lt $certificate.NotBefore -or $now -gt $certificate.NotAfter) {
              throw 'The code-signing certificate is not currently valid.'
            }

            $moduleFiles = @(
              Get-Item -Path ./M365.Toolkit.psd1, ./M365.Toolkit.psm1
              Get-ChildItem -Path ./src/Private, ./src/Public -Recurse -File |
                Where-Object Extension -In '.ps1', '.psm1', '.psd1', '.ps1xml', '.cdxml'
            )

            foreach ($file in $moduleFiles) {
              Write-Host "[$(Get-Date -Format o)] Signing $($file.FullName)"
              $signingParameters = @{
                FilePath      = $file.FullName
                Certificate   = $certificate
                HashAlgorithm = 'SHA256'
                IncludeChain  = 'All'
              }
              if (-not $isSelfSigned) {
                $signingParameters.TimestampServer = 'https://timestamp.digicert.com'
              }

              $signature = Set-AuthenticodeSignature @signingParameters
              Write-Host "[$(Get-Date -Format o)] Signature status: $($signature.Status)"

              if ($signature.Status -ne [System.Management.Automation.SignatureStatus]::Valid) {
                throw "Failed to sign '$($file.FullName)': $($signature.StatusMessage)"
              }
            }

            $invalidSignatures = @(
              $moduleFiles |
                Get-AuthenticodeSignature |
                Where-Object Status -ne ([System.Management.Automation.SignatureStatus]::Valid)
            )
            if ($invalidSignatures.Count -gt 0) {
              $invalidFiles = $invalidSignatures.Path -join ', '
              throw "Signature validation failed for: $invalidFiles"
            }

            Write-Host "Signed and validated $($moduleFiles.Count) module files."
          }
          finally {
            if ($null -ne $certificate) {
              foreach ($storeName in $temporaryTrustStores) {
                $store = [Security.Cryptography.X509Certificates.X509Store]::new(
                  $storeName,
                  [Security.Cryptography.X509Certificates.StoreLocation]::CurrentUser
                )
                try {
                  $store.Open([Security.Cryptography.X509Certificates.OpenFlags]::ReadWrite)
                  $store.Remove($certificate)
                }
                finally {
                  $store.Close()
                }
              }
            }
            foreach ($pfxCertificate in $pfxCertificates) {
              $pfxCertificate.Dispose()
            }
            if ($null -ne $pfxBytes) {
              [Array]::Clear($pfxBytes, 0, $pfxBytes.Length)
            }
          }

      - name: Create or update GitHub release
        if: github.event_name != 'pull_request'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.release_tag }}
          name: Release ${{ steps.version.outputs.release_tag }}
          body: |
            Automated release for M365.Toolkit version ${{ steps.version.outputs.module_version }}.
          allowUpdates: true
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish module to PowerShell Gallery
        if: github.event_name != 'pull_request'
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERYAPIKEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PSGALLERY_API_KEY)) {
            throw 'Secret PSGALLERYAPIKEY is missing. Add it in repository secrets.'
          }

          $manifestPath = './M365.Toolkit.psd1'
          $manifest = Import-PowerShellDataFile -Path $manifestPath
          $moduleName = (Split-Path -Path $manifestPath -LeafBase)
          $moduleVersion = [version]$manifest.ModuleVersion

          $galleryModule = Find-Module -Name $moduleName -Repository PSGallery -ErrorAction SilentlyContinue
          if ($null -ne $galleryModule -and [version]$galleryModule.Version -ge $moduleVersion) {
            Write-Host "Skipping publish. $moduleName version $($galleryModule.Version) already exists in PSGallery."
            exit 0
          }

          Publish-Module -Path . -NuGetApiKey $env:PSGALLERY_API_KEY -Force -ErrorAction Stop
