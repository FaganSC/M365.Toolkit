name: Production Build, Release, and Publish Module

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test-release-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read module version from manifest
        id: version
        shell: pwsh
        run: |
          $manifest = Import-PowerShellDataFile -Path ./M365.Toolkit.psd1
          $moduleVersion = [string]$manifest.ModuleVersion
          if ([string]::IsNullOrWhiteSpace($moduleVersion)) {
            throw 'ModuleVersion was not found in M365.Toolkit.psd1.'
          }

          $releaseTag = "v$moduleVersion"

          "module_version=$moduleVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_tag=$releaseTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install test dependencies
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.0.0 -Force -Scope CurrentUser
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          Install-Module -Name PnP.PowerShell -RequiredVersion 3.1.0 -Force -Scope CurrentUser -AllowClobber

      - name: Validate module manifest
        shell: pwsh
        run: |
          Test-ModuleManifest -Path ./M365.Toolkit.psd1 | Out-Null

      - name: Run Pester tests
        shell: pwsh
        run: |
          Invoke-Pester -Path ./src/tests/M365.Toolkit.Tests.ps1 -CI

      - name: Create or update GitHub release
        if: github.event_name != 'pull_request'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.release_tag }}
          name: Release ${{ steps.version.outputs.release_tag }}
          body: |
            Automated release for M365.Toolkit version ${{ steps.version.outputs.module_version }}.
          allowUpdates: true
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish module to PowerShell Gallery
        if: github.event_name != 'pull_request'
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERYAPIKEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PSGALLERY_API_KEY)) {
            throw 'Secret PSGALLERYAPIKEY is missing. Add it in repository secrets.'
          }

          $manifestPath = './M365.Toolkit.psd1'
          $manifest = Import-PowerShellDataFile -Path $manifestPath
          $moduleName = (Split-Path -Path $manifestPath -LeafBase)
          $moduleVersion = [version]$manifest.ModuleVersion

          $galleryModule = Find-Module -Name $moduleName -Repository PSGallery -ErrorAction SilentlyContinue
          if ($null -ne $galleryModule -and [version]$galleryModule.Version -ge $moduleVersion) {
            Write-Host "Skipping publish. $moduleName version $($galleryModule.Version) already exists in PSGallery."
            exit 0
          }

          Publish-Module -Path . -NuGetApiKey $env:PSGALLERY_API_KEY -Force -ErrorAction Stop
