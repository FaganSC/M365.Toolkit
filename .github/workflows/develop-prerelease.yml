name: Publish Develop Prerelease

on:
  push:
    branches:
      - develop
    paths-ignore:
      - M365.Toolkit.psd1
      - docs/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: develop-prerelease
  cancel-in-progress: false

jobs:
  build-sign-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest

    steps:
      - name: Checkout develop
        uses: actions/checkout@v7
        with:
          ref: develop

      - name: Install dependencies
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.0.0 -Force -Scope CurrentUser
          Install-Module -Name PnP.PowerShell -RequiredVersion 3.1.0 -Force -Scope CurrentUser -AllowClobber

      - name: Bump preview version
        id: version
        shell: pwsh
        run: |
          $newVersion = ./build/Update-ModuleVersion.ps1 `
            -ManifestPath ./M365.Toolkit.psd1 `
            -Bump Build `
            -Prerelease preview

          "module_version=$newVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "package_version=$newVersion-preview" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate and test module
        shell: pwsh
        run: |
          Test-ModuleManifest -Path ./M365.Toolkit.psd1 | Out-Null
          Invoke-Pester -Path ./src/tests/M365.Toolkit.Tests.ps1 -CI

      - name: Commit preview version
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add M365.Toolkit.psd1
          git commit -m "chore: bump preview version to $env:PACKAGE_VERSION [skip ci]"
          git push origin HEAD:develop

      - name: Sign module scripts
        shell: pwsh
        env:
          CODESIGNINGPFXBASE64: ${{ secrets.CODESIGNINGPFXBASE64 }}
          CODESIGNINGPFXPASSWORD: ${{ secrets.CODESIGNINGPFXPASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CODESIGNINGPFXBASE64)) {
            throw 'Secret CODESIGNINGPFXBASE64 is missing.'
          }
          if ([string]::IsNullOrWhiteSpace($env:CODESIGNINGPFXPASSWORD)) {
            throw 'Secret CODESIGNINGPFXPASSWORD is missing.'
          }

          ./build/Sign-Module.ps1 `
            -ModulePath . `
            -PfxBase64 $env:CODESIGNINGPFXBASE64 `
            -PfxPassword $env:CODESIGNINGPFXPASSWORD

      - name: Publish preview to PowerShell Gallery
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERYAPIKEY }}
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PSGALLERY_API_KEY)) {
            throw 'Secret PSGALLERYAPIKEY is missing.'
          }

          $existing = Find-Module `
            -Name M365.Toolkit `
            -RequiredVersion $env:PACKAGE_VERSION `
            -AllowPrerelease `
            -Repository PSGallery `
            -ErrorAction SilentlyContinue

          if ($null -ne $existing) {
            Write-Host "Skipping publish. M365.Toolkit $env:PACKAGE_VERSION already exists."
            exit 0
          }

          Publish-Module `
            -Path . `
            -NuGetApiKey $env:PSGALLERY_API_KEY `
            -Repository PSGallery `
            -Force `
            -ErrorAction Stop
